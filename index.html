<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Modelo AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
    }

    /* BOTÓN GRANDE */
    #ar-button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<model-viewer 
  id="modelo"
  src="https://raw.githubusercontent.com/d1aniel/realidad_aumentada/main/AR.compressed.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate>
</model-viewer>

<button id="ar-button">Ver en AR 🚀</button>

<script>
  const modelViewer = document.getElementById("modelo");
  const arButton = document.getElementById("ar-button");

  arButton.addEventListener("click", () => {
    modelViewer.activateAR();
  });
</script>

</body>
</html>
